<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瘋狂早餐大冒險</title>
    <style>
        body { font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, sans-serif; background-color: #fff3e0; color: #3e2723; text-align: center; padding: 20px; margin: 0; }
        .game-board { background-color: #ffffff; border-radius: 20px; padding: 30px; max-width: 600px; margin: 40px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 4px solid #ffb74d; }
        h1 { color: #e65100; margin-top: 0; }
        .dialogue-box { background-color: #e1f5fe; border-radius: 15px; padding: 20px; margin-bottom: 25px; font-size: 24px; font-weight: bold; color: #0277bd; min-height: 60px; }
        .dialogue-zh { font-size: 18px; color: #555; margin-top: 10px; font-weight: normal; }
        .options-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .option-btn { font-size: 20px; padding: 15px 25px; background-color: #ffca28; color: #3e2723; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .option-btn:hover { background-color: #ffc107; transform: scale(1.05); }
        .option-btn:disabled { background-color: #e0e0e0; color: #9e9e9e; cursor: not-allowed; transform: none; }
        .mission-area { display: none; background-color: #fce4ec; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .target-text { font-size: 28px; color: #c2185b; font-weight: bold; margin-bottom: 15px; }
        .mic-btn { font-size: 20px; padding: 12px 30px; background-color: #e53935; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px #b71c1c; }
        .mic-btn:active { transform: translateY(4px); box-shadow: none; }
        .feedback { margin-top: 15px; font-size: 18px; font-weight: bold; height: 25px; }
        .ending-area { display: none; margin-top: 20px; padding: 25px; background-color: #e8f5e9; border: 3px dashed #4caf50; border-radius: 15px; }
        .ending-en { font-size: 26px; color: #2e7d32; font-weight: bold; margin-bottom: 15px; line-height: 1.4; }
        .ending-zh { font-size: 20px; color: #555; line-height: 1.4; }
        
        /* 新增：語音控制按鈕樣式 */
        .control-btn { font-size: 16px; padding: 10px 20px; background-color: #0288d1; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .control-btn:hover { background-color: #0277bd; }
        
        #start-screen { margin-bottom: 20px; }
        .start-btn { font-size: 24px; padding: 15px 40px; background-color: #4caf50; color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="game-board">
        <h1>🍳 瘋狂早餐大冒險</h1>
        <div id="start-screen">
            <button class="start-btn" onclick="startGame()">▶️ 開始遊戲</button>
            <p style="color: #666; margin-top:10px;">提醒：本地測試時，每一關都會要求麥克風權限喔！</p>
        </div>
        <div id="game-content" style="display: none;">
            <div class="dialogue-box">
                <div id="mom-en">What do you want to eat?</div>
                <div class="dialogue-zh" id="mom-zh">你想吃什麼？</div>
            </div>
            <div class="options-container" id="options-container"></div>
            <div class="mission-area" id="mission-area">
                <div style="font-size: 18px; color: #555; margin-bottom: 10px;">請跟著大聲唸：</div>
                <div class="target-text" id="target-text">I want a hamburger.</div>
                <button class="mic-btn" id="mic-btn" onclick="toggleListening()">🎤 點擊說話</button>
                <div class="feedback" id="feedback-msg"></div>
            </div>
            <div class="ending-area" id="ending-area">
                <div class="ending-en" id="ending-en">⏳ 老師正在寫劇本...</div>
                <div class="ending-zh" id="ending-zh"></div>
                
                <div id="tts-controls" style="display: none; margin-top: 15px; gap: 10px; justify-content: center;">
                    <button class="control-btn" id="play-pause-btn" onclick="togglePlayPause()">⏸️ 暫停</button>
                    <button class="control-btn" id="replay-btn" onclick="replayEnding()">🔄 重新發音</button>
                </div>

                <button class="start-btn" style="margin-top:20px; font-size: 18px;" onclick="location.reload()">🔄 再玩一次</button>
            </div>
        </div>
    </div>

    <script>
        // ★★★ 你的專屬 GAS 後端網址 ★★★
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwnlXllXdG9z2qQl3_bmF3X4_IiRVara0JYsNARxQZC0ZJhh078olfn5GjiMtqHcHeP/exec"; 

        let currentLevel = 1; 
        let chosenFood = "";
        let chosenDrink = "";
        let currentTargetSentence = "";
        let currentEndingText = ""; // 新增：用來儲存目前的結局英文，方便重新發音
        
        const startScreen = document.getElementById('start-screen');
        const gameContent = document.getElementById('game-content');
        const momEn = document.getElementById('mom-en');
        const momZh = document.getElementById('mom-zh');
        const optionsContainer = document.getElementById('options-container');
        const missionArea = document.getElementById('mission-area');
        const targetTextElement = document.getElementById('target-text');
        const micBtn = document.getElementById('mic-btn');
        const feedbackMsg = document.getElementById('feedback-msg');
        const endingArea = document.getElementById('ending-area');
        const ttsControls = document.getElementById('tts-controls');
        const playPauseBtn = document.getElementById('play-pause-btn');

        // 初始化語音辨識
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) {
            recognition.lang = 'en-US';
            recognition.interimResults = false;
        }

        // 移除無效的預先授權，回歸最簡單的開始流程
        function startGame() {
            startScreen.style.display = "none";
            gameContent.style.display = "block";
            loadLevel1();
        }

        function loadLevel1() {
            currentLevel = 1;
            missionArea.style.display = "none";
            const questionEn = "What do you want to eat?";
            momEn.textContent = questionEn;
            momZh.textContent = "你想吃什麼？";
            speakEnglish(questionEn); 
            optionsContainer.innerHTML = `
                <button class="option-btn" onclick="selectOption('hamburger', 'I want a hamburger.')">🍔 漢堡</button>
                <button class="option-btn" onclick="selectOption('sandwich', 'I want a sandwich.')">🥪 三明治</button>
            `;
        }

        function loadLevel2() {
            currentLevel = 2;
            missionArea.style.display = "none";
            feedbackMsg.textContent = "";
            const questionEn = "What do you want to drink?";
            momEn.textContent = questionEn;
            momZh.textContent = "你想喝什麼？";
            speakEnglish(questionEn); 
            optionsContainer.innerHTML = `
                <button class="option-btn" onclick="selectOption('milk', 'I want some milk.')">🥛 牛奶</button>
                <button class="option-btn" onclick="selectOption('juice', 'I want some juice.')">🧃 果汁</button>
            `;
        }

        function selectOption(itemValue, sentence) {
            if (currentLevel === 1) chosenFood = itemValue;
            if (currentLevel === 2) chosenDrink = itemValue;
            currentTargetSentence = sentence;
            targetTextElement.textContent = sentence;
            missionArea.style.display = "block";
            feedbackMsg.textContent = "";
            const btns = optionsContainer.querySelectorAll('.option-btn');
            btns.forEach(btn => btn.disabled = true);
        }

        function speakEnglish(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; 
            utterance.pitch = 1.1; 
            
            // 當唸完的時候，把按鈕狀態切換回暫停（如果原本是暫停的話）
            utterance.onend = () => {
                playPauseBtn.textContent = "⏸️ 暫停";
            };

            window.speechSynthesis.speak(utterance);
        }

        // 新增：暫停與繼續播放邏輯
        function togglePlayPause() {
            if (window.speechSynthesis.speaking) {
                if (window.speechSynthesis.paused) {
                    window.speechSynthesis.resume();
                    playPauseBtn.textContent = "⏸️ 暫停";
                } else {
                    window.speechSynthesis.pause();
                    playPauseBtn.textContent = "▶️ 播放";
                }
            }
        }

        // 新增：重新發音邏輯
        function replayEnding() {
            window.speechSynthesis.cancel(); // 先取消目前正在唸的所有語音
            playPauseBtn.textContent = "⏸️ 暫停"; // 重置按鈕狀態
            speakEnglish(currentEndingText); // 重新呼叫發音函數
        }

        function toggleListening() {
            if (!recognition) return alert("請使用 Google Chrome 瀏覽器以支援語音辨識喔！");
            
            // 在每次錄音前，先確保電腦沒有在講話，以免錄到電腦自己的聲音
            window.speechSynthesis.cancel(); 

            recognition.start();
            micBtn.textContent = "👂 聆聽中...";
            micBtn.style.backgroundColor = "#b71c1c";
            feedbackMsg.textContent = "";
        }

        if (recognition) {
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                const targetText = currentTargetSentence.toLowerCase().replace(/[.,!?]/g, '');
                const cleanTranscript = transcript.replace(/[.,!?]/g, '');

                if (cleanTranscript.includes(targetText) || cleanTranscript === targetText) {
                    feedbackMsg.style.color = "#2e7d32";
                    feedbackMsg.textContent = "✅ 太棒了！發音很標準！";
                    setTimeout(() => { currentLevel === 1 ? loadLevel2() : fetchEnding(); }, 1500);
                } else {
                    feedbackMsg.style.color = "#c2185b";
                    feedbackMsg.textContent = `🤔 差一點點，再試一次！(聽到: ${transcript})`;
                }
            };
            recognition.onspeechend = () => {
                recognition.stop();
                micBtn.textContent = "🎤 點擊說話";
                micBtn.style.backgroundColor = "#e53935";
            };
            recognition.onerror = (event) => {
                feedbackMsg.style.color = "red";
                feedbackMsg.textContent = "錯誤代碼：" + event.error + "，請確認麥克風已允許。";
                micBtn.textContent = "🎤 點擊說話";
                micBtn.style.backgroundColor = "#e53935";
            };
        }

        async function fetchEnding() {
            document.querySelector('.dialogue-box').style.display = "none";
            optionsContainer.style.display = "none";
            missionArea.style.display = "none";
            endingArea.style.display = "block";
            ttsControls.style.display = "none"; // 載入時先隱藏控制按鈕
            
            const endingEn = document.getElementById('ending-en');
            const endingZh = document.getElementById('ending-zh');
            endingEn.textContent = "⏳ 魔法老師正在構思結局...";
            endingZh.textContent = "";

            try {
                const response = await fetch(`${GAS_WEB_APP_URL}?food=${chosenFood}&drink=${chosenDrink}`);
                const data = await response.json();
                
                currentEndingText = data.english; // 存下英文，供重新發音使用
                endingEn.textContent = data.english;
                endingZh.textContent = data.chinese;
                
                ttsControls.style.display = "flex"; // 取得結局後顯示控制按鈕
                speakEnglish(data.english);

            } catch (error) {
                console.error("Fetch Error:", error);
                const fallbackText = `You eat the ${chosenFood} and drink the ${chosenDrink}. It is very yummy. Have a good day!`;
                currentEndingText = fallbackText;
                
                endingEn.textContent = fallbackText;
                endingZh.textContent = `你吃了${chosenFood}喝了${chosenDrink}。非常美味。祝你有美好的一天！(連線異常)`;
                
                ttsControls.style.display = "flex";
                speakEnglish(fallbackText);
            }
        }
    </script>
</body>
</html>
